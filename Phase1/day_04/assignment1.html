<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Like & Dislike Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Georgia, serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#222;
}

.card{
    width:300px;
    background:#fff;
    border-radius:12px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

.card img{
    width:200px;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    border:3px solid #ddd;
}

h2{
    margin:15px 0;
}

.action{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin:15px 0;
}

button{
    width:60px;
    height:60px;
    border-radius:10px;
    border:2px solid #999;
    background:white;
    font-size:28px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.like:hover{
    background:#ffe66d;
}

.dislike:hover{
    background:#ffb3b3;
}

.count{
    font-size:24px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

    <img src="king.jpeg" alt="King Khan">

    <h2>King Khan</h2>

    <div class="action">
        <button class="like" onclick="like()">👍</button>
        <span class="count">Count: <span id="likeCount">0</span></span>
    </div>

    <div class="action">
        <button class="dislike" onclick="dislike()">👎</button>
        <span class="count">Count: <span id="dislikeCount">0</span></span>
    </div>

</div>

<script>

let likeCount = 0;
let dislikeCount = 0;

function like(){
    likeCount++;
    document.getElementById("likeCount").innerText = likeCount;
}

function dislike(){
    dislikeCount++;
    document.getElementById("dislikeCount").innerText = dislikeCount;
}

</script>

</body>
</html>
