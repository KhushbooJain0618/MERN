<!DOCTYPE html>
<html>
<head>
    <title>Jacket Collection</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f8f8f8;
            font-family: Arial, sans-serif;
        }

        .main-container {
            width: 90%;
            margin: 40px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }

        .jacket-card {
            background: #fafafa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .jacket-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
        }

        .jacket-card h3 {
            color: #333;
            margin-top: 15px;
        }

    </style>
</head>

<body>

    <div class="main-container">
