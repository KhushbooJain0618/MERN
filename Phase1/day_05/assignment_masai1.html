<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive DOM Manipulation</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        input{
            display: block;
            width: 250px;
            padding: 10px;
            margin: 10px 0;
        }

        button{
            padding: 8px 15px;
            margin-right: 10px;
            cursor: pointer;
        }

        #box{
            width: 300px;
            height: 150px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>

<body>
    <input type="text" id="colorInput" placeholder="Enter a color name or hex code">
    <input type="text" id="textInput" placeholder="Enter some text">

    <button id="bgBtn">Change Background Color</button>
    <button id="textBtn">Change Text</button>

    <div id="box">Initial Text</div>

    <script>
        const colorInput = document.getElementById('colorInput');
        const textInput = document.getElementById('textInput');
        const box = document.getElementById('box');

        document.getElementById('bgBtn').addEventListener('click', () => {
            const color = colorInput.value.trim();
            const temp = new Option().style;
            temp.color = color;
            if (temp.color !== '') {
                box.style.backgroundColor = color;
            } else {
                alert('Please enter a valid color name or hex code.');
            }
        });

        document.getElementById('textBtn').addEventListener('click', () => {
            const text = textInput.value.trim();
            if(text === '') {
                alert('Please enter some text.');
            } else {
                box.textContent = text;
            }
        });
    </script>
</body>
</html>
