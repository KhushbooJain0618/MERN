<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Length Checker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    background:#fff;
    padding:30px;
    width:350px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:2px solid #4facfe;
    border-radius:8px;
    margin-bottom:15px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#008cff;
}

p{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

.weak{
    color:red;
}

.good{
    color:orange;
}

.strong{
    color:green;
}
</style>
</head>

<body>

<div class="container">
    <h2>Password Length Checker</h2>

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="checkPassword()">Check</button>

    <p id="result"></p>
</div>

<script>
function checkPassword(){
    let password = document.getElementById("password").value;
    let result = document.getElementById("result");

    if(password.length==0){
        result.innerHTML="Please enter a password";
        result.className="";
    }
    else if(password.length<8){
        result.innerHTML="Weak Password";
        result.className="weak";
    }
    else if(password.length<=12){
        result.innerHTML="Good Password";
        result.className="good";
    }
    else{
        result.innerHTML="Strong Password";
        result.className="strong";
    }
}
</script>

</body>
</html>
